name: Update download site

# When a Dida Code release is published (the draft created by release.yml is
# reviewed and published by the maintainer), refresh the download links,
# update manifest, checksums, and notes on code.didabit.com so they point at
# the new versioned assets. Asset names stay versioned; the site is the moving
# part that always resolves to the latest release.
#
# Requires a repository secret SITE_REPO_TOKEN: a fine-grained PAT (or GitHub
# App token) with Contents: write on nova-globen/dida-code-site. Without it the
# checkout of the site repo fails and this workflow is a no-op for the release.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version and one-line notes
        id: rel
        env:
          TAG: ${{ github.event.release.tag_name }}
          BODY: ${{ github.event.release.body }}
        run: |
          version="${TAG#v}"
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "tag $TAG is not a vX.Y.Z release; skipping" >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          notes="$(printf '%s\n' "$BODY" | grep -m1 -v '^[[:space:]]*$' || true)"
          echo "notes=$notes" >> "$GITHUB_OUTPUT"

      - name: Download release checksums and notes
        if: steps.rel.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
          REPO: ${{ github.repository }}
          BODY: ${{ github.event.release.body }}
        run: |
          mkdir -p dl
          gh release download "$TAG" --repo "$REPO" --pattern SHA256SUMS.txt --dir dl || echo "no SHA256SUMS.txt asset"
          printf '%s\n' "$BODY" > dl/release-notes.txt

      - name: Checkout site repository
        if: steps.rel.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: nova-globen/dida-code-site
          token: ${{ secrets.SITE_REPO_TOKEN }}
          path: site

      - name: Apply release to the site
        if: steps.rel.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.rel.outputs.version }}
          NOTES: ${{ steps.rel.outputs.notes }}
        run: |
          node site/scripts/apply-release.mjs --version="$VERSION" --date="$(date -u +%F)" --notes="$NOTES"
          if [ -f dl/SHA256SUMS.txt ]; then cp dl/SHA256SUMS.txt site/code/SHA256SUMS.txt; fi
          if [ -s dl/release-notes.txt ]; then cp dl/release-notes.txt site/code/release-notes.txt; fi

      - name: Commit and push
        if: steps.rel.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: |
          cd site
          git config user.name "dida-release-bot"
          git config user.email "release@didabit.com"
          git add -A
          if git diff --cached --quiet; then
            echo "site already up to date for $VERSION"
          else
            git commit -m "chore: publish Dida Code $VERSION download links"
            git push
          fi
